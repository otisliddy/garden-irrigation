<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1010" viewBox="0 0 1500 1010" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>
  <style>
    .box  { stroke:#455a64; stroke-width:1.5; }
    .ttl  { font-size:13px; font-weight:700; fill:#102027; }
    .sub  { font-size:10.5px; fill:#37474f; }
    .pin  { font-size:10.5px; fill:#263238; font-family:Consolas,monospace; }
    .lbl  { font-size:10.5px; fill:#000; }
    .rail { fill:none; stroke-width:3.2; }
    .net  { fill:none; stroke-width:2; }
    .a    { marker-end:url(#arr); }
    .v12  { stroke:#d32f2f; } .v5 { stroke:#f57c00; } .v33 { stroke:#c9a227; }
    .gnd  { stroke:#212121; } .dig { stroke:#1976d2; } .i2c { stroke:#2e7d32; }
    .ana  { stroke:#7b1fa2; } .dash { stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="1500" height="1010" fill="#fbfdff"/>
  <text x="28" y="34" font-size="21" font-weight="700" fill="#0d47a1">Perfboard Wiring — SONGLE relay on-board, power rails, sensor fan-out</text>
  <text x="28" y="54" class="sub">Sensor signal goes through the board ONLY if it needs a component (pull-up). Plain ESP-only signals bypass. All sensor VCC/GND come from the board.</text>

  <!-- legend -->
  <rect x="1150" y="68" width="330" height="120" class="box" fill="#ffffff"/>
  <text x="1162" y="86" class="ttl">Wire key</text>
  <line x1="1162" y1="101" x2="1190" y2="101" class="rail v12"/><text x="1198" y="105" class="lbl">+12V (Wago)</text>
  <line x1="1162" y1="119" x2="1190" y2="119" class="rail v5"/><text x="1198" y="123" class="lbl">+5V (from ESP 5V pin)</text>
  <line x1="1162" y1="137" x2="1190" y2="137" class="rail v33"/><text x="1198" y="141" class="lbl">3V3 (sensor VCC, from ESP)</text>
  <line x1="1162" y1="155" x2="1190" y2="155" class="rail gnd"/><text x="1198" y="159" class="lbl">GND</text>
  <line x1="1162" y1="173" x2="1190" y2="173" class="net dig"/><text x="1198" y="177" class="lbl">digital GPIO</text>
  <line x1="1330" y1="119" x2="1358" y2="119" class="net i2c"/><text x="1366" y="123" class="lbl">I²C</text>
  <line x1="1330" y1="155" x2="1358" y2="155" class="net ana dash"/><text x="1366" y="159" class="lbl">AOUT — BYPASS</text>
  <circle cx="1336" cy="137" r="3.2" fill="#212121"/><text x="1366" y="141" class="lbl">● = junction</text>

  <!-- ============ ESP32 (left) ============ -->
  <rect x="40" y="150" width="185" height="500" class="box" fill="#b3e5fc"/>
  <text x="132" y="172" class="ttl" text-anchor="middle">ESP32-S3</text>
  <text x="132" y="187" class="sub" text-anchor="middle">(relevant pins)</text>
  <text x="50" y="212" class="pin">3V3 out   →board</text>
  <text x="50" y="234" class="pin">GND       →board</text>
  <text x="50" y="262" class="pin">GPIO 6 batt ←board</text>
  <text x="50" y="284" class="pin">GPIO 8 SDA ↔board</text>
  <text x="50" y="306" class="pin">GPIO 9 SCL ↔board</text>
  <text x="50" y="334" class="pin">GPIO 13 btnA←board</text>
  <text x="50" y="356" class="pin">GPIO 14 btnB←board</text>
  <text x="50" y="378" class="pin">GPIO 21 btnP←board</text>
  <text x="50" y="406" class="pin">GPIO 41 relay→board</text>
  <text x="50" y="428" class="pin">GPIO 42 LED →board</text>
  <line x1="50" y1="442" x2="214" y2="442" stroke="#4fc3f7"/>
  <text x="50" y="464" class="pin">GPIO 1 soil1 ◄┐</text>
  <text x="50" y="486" class="pin">GPIO 2 soil2 ◄┤</text>
  <text x="50" y="508" class="pin">GPIO 3 soil3 ◄┤BYPASS</text>
  <text x="50" y="530" class="pin">GPIO 4 soil4 ◄┤(direct)</text>
  <text x="50" y="552" class="pin">GPIO 5 soil5 ◄┘</text>
  <line x1="50" y1="566" x2="214" y2="566" stroke="#4fc3f7"/>
  <text x="50" y="588" class="sub">Valve pins 7,10,11,12,</text>
  <text x="50" y="604" class="sub">15,16,17,18,40 → L298N</text>
  <text x="50" y="628" class="sub">Beds A open = GPIO 40</text>

  <!-- ============ PERFBOARD ============ -->
  <rect x="295" y="118" width="760" height="640" class="box" fill="#fffde7" rx="6"/>
  <text x="675" y="138" class="ttl" text-anchor="middle">PERFBOARD</text>

  <!-- power rails -->
  <line x1="310" y1="158" x2="1045" y2="158" class="rail v12"/><text x="935" y="153" class="lbl">+12V ← Wago</text>
  <line x1="310" y1="184" x2="1045" y2="184" class="rail v5"/> <text x="905" y="179" class="lbl">+5V ← ESP 5V pin (USB 5V)</text>
  <line x1="310" y1="210" x2="1045" y2="210" class="rail v33"/><text x="958" y="205" class="lbl">3V3 ← ESP</text>
  <line x1="310" y1="236" x2="1045" y2="236" class="rail gnd"/><text x="905" y="249" class="lbl">GND ← ESP / common (star pt at Wago)</text>

  <!-- ===== Row 1 blocks ===== -->
  <!-- Decoupling: LEFTMOST = right at the 3V3/GND power entry -->
  <rect x="330" y="290" width="220" height="92" class="box" fill="#fff3c4"/>
  <text x="440" y="311" class="ttl" text-anchor="middle">Decoupling (at power entry)</text>
  <text x="344" y="331" class="sub">10µF + 104 across 3V3 ↔ GND</text>
  <text x="344" y="347" class="sub">sits right where 3V3 / GND</text>
  <text x="344" y="365" class="sub">land on the board from the ESP</text>
  <line x1="355" y1="290" x2="355" y2="210" class="net v33"/><circle cx="355" cy="210" r="3.2" fill="#c9a227"/>
  <line x1="520" y1="290" x2="520" y2="236" class="net gnd"/><circle cx="520" cy="236" r="3.2" fill="#212121"/>

  <!-- Battery divider: MIDDLE -->
  <rect x="590" y="290" width="215" height="92" class="box" fill="#fff3c4"/>
  <text x="697" y="311" class="ttl" text-anchor="middle">Battery divider → GPIO 6</text>
  <text x="604" y="331" class="sub">1MΩ: +12V → tap</text>
  <text x="604" y="347" class="sub">100kΩ + 104: tap → GND</text>
  <text x="604" y="365" class="sub">tap ≈ Vbat/11 (≤3.3V), ~11µA</text>
  <line x1="615" y1="290" x2="615" y2="158" class="net v12"/><circle cx="615" cy="158" r="3.2" fill="#d32f2f"/>
  <line x1="785" y1="290" x2="785" y2="236" class="net gnd"/><circle cx="785" cy="236" r="3.2" fill="#212121"/>

  <!-- I2C pull-ups: RIGHT (nearest cable 1) -->
  <rect x="845" y="290" width="190" height="92" class="box" fill="#fff3c4"/>
  <text x="940" y="311" class="ttl" text-anchor="middle">I²C pull-ups</text>
  <text x="859" y="331" class="sub">4.7k: SDA → 3V3</text>
  <text x="859" y="347" class="sub">4.7k: SCL → 3V3</text>
  <text x="859" y="365" class="sub">lines pass through</text>
  <line x1="865" y1="290" x2="865" y2="210" class="net v33"/><circle cx="865" cy="210" r="3.2" fill="#c9a227"/>

  <!-- ===== Row 2 blocks ===== -->
  <!-- Relay + low-side driver -->
  <rect x="330" y="420" width="370" height="175" class="box" fill="#ffe0b2"/>
  <text x="515" y="441" class="ttl" text-anchor="middle">SONGLE relay (bare) + low-side driver</text>
  <text x="344" y="462" class="pin">coil+ → +5V        coil− → collector</text>
  <text x="344" y="482" class="pin">GPIO 41 →[1k]→ base</text>
  <text x="344" y="500" class="pin">base →[10k]→ GND   (OFF at boot/sleep)</text>
  <text x="344" y="518" class="pin">emitter → GND      PN2222 NPN</text>
  <text x="344" y="536" class="pin">1N4007 ∥ coil  (cathode → +5V)</text>
  <text x="344" y="556" class="pin">COM ← +12V   NO → L298N VCC ×2   NC: n/c</text>
  <text x="344" y="578" class="sub">GPIO 41 HIGH = relay ON  (no inversion)</text>
  <!-- relay rail taps (routed up the gap between decoupling and divider) -->
  <line x1="560" y1="420" x2="560" y2="184" class="net v5"/><circle cx="560" cy="184" r="3.2" fill="#f57c00"/>
  <line x1="570" y1="420" x2="570" y2="158" class="net v12"/><circle cx="570" cy="158" r="3.2" fill="#d32f2f"/>
  <line x1="580" y1="420" x2="580" y2="236" class="net gnd"/><circle cx="580" cy="236" r="3.2" fill="#212121"/>

  <!-- Button pull-ups -->
  <rect x="730" y="420" width="155" height="175" class="box" fill="#fff3c4"/>
  <text x="807" y="441" class="ttl" text-anchor="middle">Button pull-ups</text>
  <text x="744" y="463" class="pin">10k → 3V3 ×3</text>
  <text x="744" y="483" class="pin">nodes → GPIO</text>
  <text x="744" y="501" class="pin">13 / 14 / 21</text>
  <text x="744" y="521" class="pin">buttons → GND</text>
  <text x="744" y="545" class="sub">(buttons on</text>
  <text x="744" y="560" class="sub">enclosure)</text>
  <line x1="815" y1="420" x2="815" y2="210" class="net v33"/><circle cx="815" cy="210" r="3.2" fill="#c9a227"/>
  <line x1="825" y1="420" x2="825" y2="236" class="net gnd"/><circle cx="825" cy="236" r="3.2" fill="#212121"/>

  <!-- LED -->
  <rect x="915" y="420" width="120" height="175" class="box" fill="#fff3c4"/>
  <text x="975" y="441" class="ttl" text-anchor="middle">LED</text>
  <text x="929" y="463" class="pin">GPIO 42</text>
  <text x="929" y="481" class="pin">→ 220Ω</text>
  <text x="929" y="499" class="pin">→ anode</text>
  <text x="929" y="519" class="pin">cathode→GND</text>
  <line x1="1040" y1="420" x2="1040" y2="236" class="net gnd"/><circle cx="1040" cy="236" r="3.2" fill="#212121"/>

  <text x="312" y="628" class="sub">Sensor VCC = the always-on 3V3 rail. (Optional later: GPIO-switched high-side FET to also cut the</text>
  <text x="312" y="644" class="sub">~25mA of soil sensors in deep sleep.)  12V load nets (COM/NO) — use heavier wire; keep clear of divider.</text>
  <line x1="310" y1="660" x2="1045" y2="660" stroke="#e0d36a"/>
  <text x="312" y="682" class="pin">Inputs : 3V3+GND+5V (all from ESP pins) · +12V (Wago) · GPIO 41,42</text>
  <text x="312" y="702" class="pin">Outputs: VCC+GND to sensors · SDA/SCL · batt tap · button sigs · LED · switched-12V → L298N</text>
  <text x="312" y="724" class="sub">Relay solders onto the board; its 3 screw contacts (NO/COM/NC) land on board pads.</text>

  <!-- ESP <-> perfboard signal lines -->
  <path class="net v33 a" d="M225,210 L295,210"/><circle cx="310" cy="210" r="3.2" fill="#c9a227"/>
  <path class="net gnd"   d="M225,232 L270,232 L270,236 L295,236"/>
  <!-- battery tap (divider, middle) → GPIO6, via the row1/row2 gap -->
  <path class="net ana a" d="M590,332 L570,332 L570,400 L240,400 L240,262 L225,262"/>
  <text x="300" y="394" class="lbl">batt → GPIO 6</text>
  <!-- I²C (right) → ESP, via the row1/row2 gap -->
  <path class="net i2c a" d="M845,322 L828,322 L828,408 L232,408 L232,284 L225,284"/>
  <path class="net i2c a" d="M845,340 L820,340 L820,414 L228,414 L228,306 L225,306"/>
  <text x="300" y="404" class="lbl">SDA / SCL → GPIO 8/9</text>
  <!-- buttons → ESP, routed below row 2 -->
  <path class="net dig a" d="M730,458 L715,458 L715,608 L248,608 L248,334 L225,334"/>
  <path class="net dig a" d="M730,478 L710,478 L710,615 L242,615 L242,356 L225,356"/>
  <path class="net dig a" d="M730,498 L705,498 L705,622 L236,622 L236,378 L225,378"/>
  <text x="300" y="602" class="lbl">buttons → GPIO 13/14/21</text>
  <!-- relay drive -->
  <path class="net dig a" d="M330,442 L225,406"/>
  <text x="236" y="422" class="lbl">G41→</text>
  <!-- LED drive, routed below row 2 -->
  <path class="net dig a" d="M915,476 L905,476 L905,636 L252,636 L252,428 L225,428"/>
  <text x="300" y="630" class="lbl">G42 → 220Ω</text>

  <!-- ============ RIGHT: cables + IO ============ -->
  <!-- switched 12V output tag -->
  <rect x="1150" y="180" width="330" height="44" class="box" fill="#ffcdd2"/>
  <text x="1315" y="200" class="ttl" text-anchor="middle">→ L298N #1 &amp; #2 VCC</text>
  <text x="1315" y="216" class="sub" text-anchor="middle">switched 12V (relay NO) · heavier wire</text>

  <rect x="1150" y="250" width="330" height="118" class="box" fill="#e1bee7"/>
  <text x="1315" y="271" class="ttl" text-anchor="middle">Cable 1 → POLYTUNNEL (5-core)</text>
  <text x="1162" y="292" class="pin">VCC, GND        → board rails</text>
  <text x="1162" y="312" class="pin">SDA, SCL (BME280)→ board pull-ups</text>
  <text x="1162" y="332" class="pin">soil1 AOUT      → BYPASS → GPIO 1</text>
  <text x="1162" y="352" class="sub">BME280 0x76 + 1 soil share the run</text>

  <rect x="1150" y="386" width="330" height="104" class="box" fill="#e1bee7"/>
  <text x="1315" y="407" class="ttl" text-anchor="middle">Cable 2 → OUTSIDE BED (5-core)</text>
  <text x="1162" y="428" class="pin">VCC, GND   → board rails</text>
  <text x="1162" y="448" class="pin">soil2 AOUT → BYPASS → GPIO 2</text>
  <text x="1162" y="468" class="pin">soil3 AOUT → BYPASS → GPIO 3</text>
  <text x="1162" y="485" class="sub">2 soil sensors · 1 core spare</text>

  <rect x="1150" y="508" width="330" height="104" class="box" fill="#e1bee7"/>
  <text x="1315" y="529" class="ttl" text-anchor="middle">Cable 3 → OUTSIDE BED (5-core)</text>
  <text x="1162" y="550" class="pin">VCC, GND   → board rails</text>
  <text x="1162" y="570" class="pin">soil4 AOUT → BYPASS → GPIO 4</text>
  <text x="1162" y="590" class="pin">soil5 AOUT → BYPASS → GPIO 5</text>
  <text x="1162" y="607" class="sub">2 soil sensors · 1 core spare</text>

  <rect x="1150" y="630" width="330" height="70" class="box" fill="#c8e6c9"/>
  <text x="1315" y="651" class="ttl" text-anchor="middle">3× zone buttons (enclosure)</text>
  <text x="1162" y="671" class="pin">signal → board pull-up nodes</text>
  <text x="1162" y="690" class="pin">other side → board GND</text>

  <rect x="1150" y="716" width="330" height="58" class="box" fill="#c8e6c9"/>
  <text x="1315" y="737" class="ttl" text-anchor="middle">Status LED (through-wall)</text>
  <text x="1162" y="757" class="pin">anode ← 220Ω · cathode → GND</text>

  <!-- perfboard -> right: rails to cables -->
  <path class="net v33 a" d="M1045,210 L1085,210 L1085,276 L1148,276"/>
  <path class="net v33 a" d="M1085,276 L1085,412 L1148,412"/>
  <path class="net v33 a" d="M1085,412 L1085,534 L1148,534"/>
  <text x="1050" y="205" class="lbl">3V3 → VCC</text>
  <path class="net gnd a" d="M1045,236 L1102,236 L1102,302 L1148,302"/>
  <path class="net gnd"   d="M1102,302 L1102,438 L1148,438"/>
  <path class="net gnd"   d="M1102,438 L1102,560 L1148,560"/>
  <path class="net gnd"   d="M1102,560 L1102,682 L1148,682"/>
  <path class="net gnd"   d="M1102,682 L1102,752 L1148,752"/>
  <text x="1050" y="231" class="lbl">GND → returns</text>

  <!-- I2C (right block) to cable1 — short -->
  <path class="net i2c a" d="M1035,322 L1115,322 L1115,300 L1148,300"/>
  <path class="net i2c a" d="M1035,340 L1108,340 L1108,316 L1148,316"/>

  <!-- switched 12V from relay NO to tag, routed in the row1/row2 gap then up -->
  <path class="net v12 a" d="M700,432 L700,408 L1128,408 L1128,200 L1148,200"/>
  <text x="760" y="403" class="lbl">switched 12V (NO)</text>

  <!-- buttons / LED to right (external), routed in the gap -->
  <path class="net dig a" d="M885,458 L885,412 L1138,412 L1138,656 L1148,656"/>
  <text x="905" y="407" class="lbl">3 button sigs</text>
  <path class="net dig a" d="M1035,500 L1132,500 L1132,738 L1148,738"/>
  <text x="1040" y="495" class="lbl">LED</text>

  <!-- ============ BYPASS CHANNEL ============ -->
  <rect x="40" y="800" width="1440" height="84" fill="#f3e5f5" stroke="#ce93d8" stroke-dasharray="6 4"/>
  <text x="52" y="820" class="ttl" fill="#6a1b9a">BYPASS CHANNEL — soil AOUT goes straight to ESP ADC, never touching the perfboard</text>
  <path class="net ana dash" d="M1180,368 L1180,842 L150,842 L150,650"/>
  <path class="net ana dash" d="M1200,490 L1200,854 L150,854"/>
  <path class="net ana dash" d="M1220,490 L1220,866 L150,866"/>
  <path class="net ana dash" d="M1240,612 L1240,842"/>
  <path class="net ana dash" d="M1260,612 L1260,854"/>
  <text x="60" y="862" class="sub" fill="#6a1b9a">soil1 (cable1)→GPIO1 · soil2/3 (cable2)→GPIO2/3 · soil4/5 (cable3)→GPIO4/5.  Their VCC/GND still come from the perfboard rails.</text>
</svg>
